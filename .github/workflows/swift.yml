name: Frame Package Test (iOS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dark-mode lint (block hardcoded color literals)
        run: |
          set -e
          # Allow-list (intentional non-adapting cases):
          #   CameraColors.swift — camera UX convention (always black mask, white stroke)
          #   ViewfinderOverlay.swift — parameter-driven black overlay (camera UX)
          #   onboardingProgressFilledOnBrand / onboardingProgressEmptyOnBrand —
          #     white-on-brand progress dots (defined in FrameTheme)
          #   primaryButtonText — white text on brand-fill button (default token value)
          # Plus one site-specific exception:
          #   FramePaymentButton.swift line 34 — Apple/Google Pay HIG brand toggle
          MATCHES=$(
            grep -RnE "\.fill\(\.(white|black)\)|\.fill\(Color\.(white|black)\)|\.foregroundColor\(\.(white|black)\)|\.foregroundColor\(Color\.(white|black)\)|\.foregroundStyle\(\.(white|black)\)|\.background\(\.(white|black)\)|\.background\(Color\.(white|black)\)|\.stroke\(\.(white|black)\)|\.stroke\(Color\.(white|black)\)|Color\.(white|black)[^a-zA-Z]|\.gray\.opacity\(|Color\.gray\.opacity\(" \
              Sources/Frame/Views Sources/FrameOnboarding FrameExample-iOS/FrameExample-iOS --include="*.swift" \
              | grep -vE "CameraColors\.swift|ViewfinderOverlay\.swift|FramePaymentButton\.swift:34|primaryButtonText|onboardingProgressFilledOnBrand|onboardingProgressEmptyOnBrand" \
              || true
          )
          if [ -n "$MATCHES" ]; then
            echo "❌ Dark-mode lint failed. Use FrameColors tokens or Apple semantic system colors instead of hardcoded literals."
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ Dark-mode lint passed."

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Configure Prove Swift Package Registry
        run: |
          swift package-registry set --global "https://prove.jfrog.io/artifactory/api/swift/libs-public-swift"
          echo "" | swift package-registry login "https://prove.jfrog.io/artifactory/api/swift/libs-public-swift"

      - name: Resolve Swift Package Dependencies
        run: swift package resolve

      - name: Pick and boot an iOS Simulator
        shell: bash
        run: |
          set -euo pipefail

          echo "== Devices (available) =="
          xcrun simctl list devices available

          # Pick the first available iPhone UDID from any iOS runtime section
          UDID="$(
            xcrun simctl list devices available |
            grep -E '^\s*iPhone ' |
            head -n 1 |
            sed -n 's/.*(\([0-9A-F-]\{36\}\)).*/\1/p'
          )"

          # Fallback to any iPad if no iPhone is present
          if [ -z "$UDID" ]; then
            UDID="$(
              xcrun simctl list devices available |
              grep -E '^\s*iPad ' |
              head -n 1 |
              sed -n 's/.*(\([0-9A-F-]\{36\}\)).*/\1/p'
            )"
          fi

          if [ -z "$UDID" ]; then
            echo "❌ No available iOS simulators found."
            exit 1
          fi

          echo "Using simulator UDID: $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run Tests on iOS Simulator
        run: |
          xcodebuild test \
            -project FrameExample-iOS/FrameExample-iOS.xcodeproj \
            -scheme FrameExample-iOS \
            -destination "id=$SIMULATOR_UDID" \
            -sdk iphonesimulator \
            -enableCodeCoverage YES
