name: Podspec Lint

on:
  push:
    branches: [ main ]
    paths:
      - '**.podspec'
      - '.github/workflows/podspec-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.podspec'
      - '.github/workflows/podspec-lint.yml'

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Pick the highest installed Xcode 16.x (image rotation changes the exact
          # patch version, so don't hardcode a path that may not exist).
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -z "$XCODE_APP" ]; then
            # Fall back to any installed Xcode, then the system default.
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1 || true)"
          fi
          if [ -n "$XCODE_APP" ]; then
            echo "Selecting $XCODE_APP"
            sudo xcode-select -s "$XCODE_APP"
          else
            echo "No /Applications/Xcode*.app found; using current selection."
          fi
          xcodebuild -version

      - name: Update CocoaPods spec repo
        run: pod repo update --silent

      - name: Lint Frame-iOS.podspec
        run: |
          pod lib lint Frame-iOS.podspec \
            --allow-warnings \
            --skip-import-validation \
            --verbose

      # Frame-Onboarding cannot be linted on the public trunk: ProveAuth lives
      # in Prove's private Artifactory spec repo, which requires the
      # cocoapods-art plugin and credentials. We only validate the podspec
      # itself parses cleanly; full resolution is verified out-of-band when
      # cutting a release.
      - name: Validate Frame-Onboarding.podspec syntax
        run: pod ipc spec Frame-Onboarding.podspec > /dev/null
